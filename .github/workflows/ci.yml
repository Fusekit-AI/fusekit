name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, "codex/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Check
        run: bash scripts/check.sh
